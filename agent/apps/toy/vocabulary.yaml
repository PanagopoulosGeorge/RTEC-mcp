# Vocabulary for the toy domain
#
# The fluent list below is intentionally UNCLASSIFIED: the translator
# (stage 1) decides whether each fluent is simple or statically-determined
# from the natural-language request, not from a pre-existing label.
# Pre-classifying them here would leak the answer the builder is
# supposed to derive.

events:
  - win_lottery(Person)    # Person wins the lottery
  - lose_wallet(Person)    # Person loses their wallet
  - go_to(Person, Place)   # Person goes to a place; Place ∈ {home, pub, work}

fluents:
  - rich(Person)           # Person is rich (boolean: true/false)
  - location(Person)       # Person's current location (place: home/pub/work)
  - happy(Person)          # Person is happy = rich OR at pub

# Background predicates (consulted at run time — not part of the signature)
background_predicates:
  - person(Person)         # Available persons: chris
  - place(Place)           # Available places: home, pub, work

# Fluent task descriptions — one entry per output fluent.
# Key = fluent name (pass directly to `cli run toy <key>`).
# Value = natural-language description of when that fluent holds.
patterns:
  rich: >
    Someone becomes rich when they win the lottery.
    They stop being rich if they lose their wallet.

  location: >
    Track where a person is at all times.
    A person's location changes whenever they go somewhere new.
    Valid places are home, pub, and work.

  happy: >
    A person is happy as long as they are rich or at the pub.

# Few-shot NL + rules pairs.
# nl  : shown to the stage-1 translator as a phrasing reference.
# rules: injected into the stage-2 RTECAgent as pre-existing rules the
#        agent must carry forward — so this fluent is available as a
#        dependency when generating the next one.
examples:
  - nl: >
      Someone becomes rich when they win the lottery and stops being rich
      when they lose their wallet.
    rules: |
      simpleFluent(rich/1).
      inputEntity(win_lottery/1).
      inputEntity(lose_wallet/1).
      outputEntity(rich/1).

      initiatedAt(rich(X)=true, T) :-
          happensAt(win_lottery(X), T).

      terminatedAt(rich(X)=true, T) :-
          happensAt(lose_wallet(X), T).

      grounding(win_lottery(X)) :- person(X).
      grounding(lose_wallet(X)) :- person(X).
      grounding(rich(X)=true) :- person(X).
      index(rich(X)=true, X).