nl_spec: >
  A vessel is loitering when it lingers at sea, moving slowly or stopped far from
  any port, for a sustained period — but not while it is hugging the coast and
  not while it is properly anchored or moored. Concretely: take the time the
  vessel is at low speed or stopped far from ports, remove any time it spends in
  a nearCoast area and any time it is anchored or moored, and keep only the
  remaining stretches that last longer than the loitering minimum duration.
